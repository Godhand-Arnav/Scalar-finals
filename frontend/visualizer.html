<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE | Analyst Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: '#0B0D17',
                        surface: 'rgba(255, 255, 255, 0.03)',
                        glassBorder: 'rgba(255, 255, 255, 0.08)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #0B0D17; 
            color: #F8FAFC;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Ambient Glow Blobs */
        .ambient-glow-1 {
            position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; pointer-events: none;
        }
        .ambient-glow-2 {
            position: fixed; bottom: -20%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; pointer-events: none;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--tw-colors-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--tw-colors-glassBorder);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Sleek Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .gradient-text {
            background: linear-gradient(135deg, #E2E8F0 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-indigo-500/30">

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <!-- Header -->
    <header class="w-full border-b border-white/5 bg-[#0B0D17]/80 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                        FORGE <span class="font-normal text-slate-400">Environment</span>
                        <span class="text-[9px] px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-400 font-mono tracking-widest border border-emerald-500/10 flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-emerald-400 animate-pulse"></span> SQLITE CACHE</span>
                    </h1>
                </div>
            </div>
            
            <div id="topStats" class="hidden flex gap-8">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-medium tracking-widest text-slate-500 uppercase">Total Episodes</span>
                    <span id="st-episodes" class="text-lg font-bold text-slate-200">0</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-medium tracking-widest text-slate-500 uppercase">Avg Reward</span>
                    <span class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400" id="st-reward">0.00</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-medium tracking-widest text-slate-500 uppercase">Accuracy</span>
                    <span class="text-lg font-bold text-emerald-400" id="st-acc">0.0%</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-[1600px] w-full mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar (Input & List) -->
        <aside class="lg:col-span-4 flex flex-col h-[calc(100vh-10rem)] gap-6">
            
            <!-- Ingestion Widget -->
            <div class="glass-card rounded-3xl p-6 flex-shrink-0 relative overflow-hidden transition-all duration-300 hover:border-white/20">
                <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 blur-[50px] rounded-full pointer-events-none"></div>
                
                <h2 class="text-base font-semibold text-slate-200 mb-1">Telemetry Ingestion</h2>
                <p class="text-[11px] text-slate-500 mb-4 tracking-wide">Paste the JSON logs emitted by OpenEnv</p>
                
                <textarea id="logInput" class="w-full h-40 bg-[#0B0D17]/50 border border-white/5 rounded-2xl p-4 font-mono text-[11px] leading-relaxed focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 text-slate-300 resize-none transition-all" placeholder="[START] {...}
[STEP] {...}
[END] {...}"></textarea>
                
                <button onclick="parseLogs()" class="mt-4 w-full bg-slate-100 hover:bg-white text-slate-900 font-semibold py-3.5 rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.1)] transition-all duration-200 flex justify-center items-center gap-2 group">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Analyze Logs
                </button>
            </div>

            <!-- Episode List -->
            <div class="glass-card rounded-3xl flex-1 flex flex-col overflow-hidden">
                <div class="px-6 py-5 border-b border-white/5">
                    <h3 class="text-[11px] font-semibold text-slate-400 uppercase tracking-widest">Episode Directory</h3>
                </div>
                <div id="episodeList" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2">
                    <div class="h-full flex items-center justify-center text-slate-600 text-sm">
                        Waiting for data payload...
                    </div>
                </div>
            </div>

        </aside>

        <!-- Main Dashboard -->
        <section class="lg:col-span-8 h-[calc(100vh-10rem)]">
            <div class="glass-card rounded-3xl h-full flex flex-col relative overflow-hidden">
                
                <!-- Dashboard Header -->
                <div class="px-10 py-8 border-b border-white/5 flex justify-between items-end bg-gradient-to-b from-white/[0.02] to-transparent sticky top-0 z-20">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <span id="activeBadge" class="hidden px-2.5 py-1 rounded bg-slate-800/50 text-[10px] uppercase tracking-widest font-semibold border border-white/10 text-slate-400">STANDBY</span>
                            <h2 class="text-3xl font-bold tracking-tight gradient-text" id="activeTaskTitle">No Active Mission</h2>
                        </div>
                        <p class="text-xs text-slate-500 font-mono" id="activeTaskMeta">Awaiting episode selection</p>
                    </div>
                    
                    <div id="scoreWidget" class="hidden flex items-baseline gap-2">
                        <span class="text-[11px] uppercase tracking-widest font-medium text-slate-500">Reward</span>
                        <span class="text-4xl font-light tracking-tighter" id="activeScore">0.000</span>
                    </div>
                </div>

                <!-- Timeline Container -->
                <div id="timelineContainer" class="flex-1 overflow-y-auto p-10 z-10 relative">
                    <div class="h-full flex flex-col items-center justify-center text-slate-700 animate-fade-in">
                        <svg class="w-12 h-12 mb-4 opacity-50 stroke-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        <span class="text-sm tracking-wide">Environment is idle</span>
                    </div>
                </div>
                
            </div>
        </section>
    </main>

    <script>
        let eps = [];

        function getTypeMeta(action) {
            const types = {
                'query_source': { icon: '🔍', color: 'text-indigo-400', bg: 'bg-indigo-500/10' },
                'trace_origin': { icon: '⏪', color: 'text-purple-400', bg: 'bg-purple-500/10' },
                'cross_reference':{ icon: '📚', color: 'text-blue-400', bg: 'bg-blue-500/10' },
                'network_cluster':{ icon: '🕸️', color: 'text-pink-400', bg: 'bg-pink-500/10' },
                'temporal_audit': { icon: '⏱️', color: 'text-cyan-400', bg: 'bg-cyan-500/10' },
                'entity_link':    { icon: '🔗', color: 'text-teal-400', bg: 'bg-teal-500/10' },
                'request_context':{ icon: '📄', color: 'text-slate-400', bg: 'bg-slate-500/10' },
                'flag_manipulation':{ icon: '🚩', color: 'text-rose-400', bg: 'bg-rose-500/10' }
            };
            if(action.includes('submit')) return { icon: '⚖️', color: 'text-emerald-400', bg: 'bg-emerald-500/10' };
            return types[action] || { icon: '⚡', color: 'text-slate-400', bg: 'bg-white/5' };
        }

        function parseLogs() {
            const lines = document.getElementById('logInput').value.split('\n');
            eps = [];
            let curr = null;

            lines.forEach(l => {
                l = l.trim();
                try {
                    if(l.startsWith('[START]')) {
                        const d = JSON.parse(l.replace('[START] ', ''));
                        curr = { id: d.episode, task: d.task, steps: [], end: null };
                        eps.push(curr);
                    } else if (l.startsWith('[STEP]') && curr) {
                        curr.steps.push(JSON.parse(l.replace('[STEP] ', '')));
                    } else if (l.startsWith('[END]') && curr) {
                        curr.end = JSON.parse(l.replace('[END] ', ''));
                    }
                } catch(e) {}
            });

            if(eps.length === 0) {
                document.getElementById('timelineContainer').innerHTML = `
                    <div class="h-full flex items-center justify-center text-rose-500 font-mono text-sm">
                        Error: No valid JSON traces found
                    </div>`;
                return;
            }

            // Global Stats
            document.getElementById('topStats').classList.remove('hidden');
            let rewards = 0, correct = 0, ended = 0;
            eps.forEach(e => {
                if(e.end) {
                    ended++; rewards += e.end.reward;
                    if(e.end.correct) correct++;
                }
            });

            document.getElementById('st-episodes').innerText = eps.length;
            document.getElementById('st-reward').innerText = ended ? (rewards/ended).toFixed(3) : "0.00";
            document.getElementById('st-acc').innerText = ended ? ((correct/ended)*100).toFixed(1) + "%" : "0%";

            // List
            const listHtml = eps.map(e => {
                const isCor = e.end && e.end.correct;
                const dot = e.end ? (isCor ? 'bg-emerald-500' : 'bg-rose-500') : 'bg-slate-600';
                return `
                    <div onclick="drawEp(${e.id})" class="group cursor-pointer p-4 rounded-2xl border border-transparent hover:border-white/10 hover:bg-white/[0.03] transition-all flex items-center gap-4">
                        <div class="w-1.5 h-1.5 rounded-full ${dot} shadow-[0_0_10px_currentColor]"></div>
                        <div class="flex-1">
                            <div class="text-sm font-medium text-slate-200 group-hover:text-white transition-colors">Episode ${e.id}</div>
                            <div class="text-[10px] text-slate-500 uppercase tracking-widest mt-0.5">${e.task.replace(/_/g, ' ')}</div>
                        </div>
                        <div class="font-mono text-xs ${e.end && e.end.reward > 0 ? 'text-emerald-400/80' : 'text-slate-500'}">
                            ${e.end ? e.end.reward.toFixed(2) : '-'}
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('episodeList').innerHTML = listHtml;

            drawEp(eps[0].id);
        }

        function drawEp(id) {
            const e = eps.find(x => x.id === id);
            if(!e) return;

            const badge = document.getElementById('activeBadge');
            badge.classList.remove('hidden');
            badge.innerText = e.end ? (e.end.correct ? 'VERIFIED' : 'FAILED') : 'PENDING';
            badge.className = `px-2.5 py-1 rounded text-[10px] uppercase tracking-widest font-semibold border ${e.end ? (e.end.correct ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20') : 'bg-slate-800/50 text-slate-400 border-white/10'}`;

            const taskIcons = {
                'politifact_liar': '🏛️ ',
                'image_forensics': '🖼️ ',
                'sec_fraud': '📈 ',
                'fabricated_stats': '📊 ',
                'out_of_context': '✂️ ',
                'coordinated_campaign': '🕸️ '
            };
            const icon = taskIcons[e.task] || '';
            document.getElementById('activeTaskTitle').innerText = icon + e.task.replace(/_/g, ' ').toUpperCase();
            document.getElementById('activeTaskMeta').innerText = `EPISODE NO. ${e.id}`;

            const sw = document.getElementById('scoreWidget');
            const sc = document.getElementById('activeScore');
            if(e.end) {
                sw.classList.remove('hidden');
                sc.innerText = e.end.reward.toFixed(3);
                sc.className = `text-4xl font-light tracking-tighter ${e.end.reward > 0 ? 'text-emerald-400' : 'text-rose-400'}`;
            } else sw.classList.add('hidden');

            // Build Timeline
            let tl = `<div class="relative pl-6 before:content-[''] before:absolute before:left-[7px] before:top-4 before:bottom-0 before:w-[1px] before:bg-white/10">`;

            e.steps.forEach((s, idx) => {
                const meta = getTypeMeta(s.action);
                tl += `
                    <div class="mb-6 relative animate-slide-up opacity-0 z-10" style="animation-delay: ${idx * 60}ms;">
                        <div class="absolute -left-[27px] top-4 w-[7px] h-[7px] rounded-full bg-slate-800 border-[1.5px] border-slate-500 ring-4 ring-[#0B0D17]"></div>
                        <div class="ml-2 group bg-white/[0.02] hover:bg-white/[0.04] border border-white/5 rounded-2xl p-5 transition-all flex justify-between items-center backdrop-blur-sm">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-xl ${meta.bg} flex items-center justify-center text-lg shadow-inner">
                                    ${meta.icon}
                                </div>
                                <div>
                                    <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Step ${idx+1}</div>
                                    <h4 class="text-[15px] font-semibold text-slate-200 capitalize tracking-tight">${s.action.replace(/_/g, ' ')}</h4>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="font-mono text-sm ${s.reward > 0 ? 'text-emerald-400' : (s.reward < 0 ? 'text-rose-400' : 'text-slate-500')}">
                                    ${s.reward > 0 ? '+' : ''}${s.reward.toFixed(4)}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });

            if(e.end) {
                const isCor = e.end.correct;
                const eBg = isCor ? 'bg-gradient-to-b from-emerald-500/5 to-transparent border-emerald-500/10' : 'bg-gradient-to-b from-rose-500/5 to-transparent border-rose-500/10';
                tl += `
                    <div class="mt-10 relative animate-slide-up opacity-0 z-10" style="animation-delay: ${e.steps.length * 60}ms;">
                        <div class="absolute -left-[29px] top-4 w-[11px] h-[11px] rounded-full ${isCor ? 'bg-emerald-500 shadow-[0_0_10px_#10B981]' : 'bg-rose-500 shadow-[0_0_10px_#F43F5E]'} ring-4 ring-[#0B0D17]"></div>
                        
                        <div class="ml-2 ${eBg} border rounded-3xl p-8 backdrop-blur-md">
                            <h3 class="text-xl font-bold mb-6 text-slate-100 flex items-center gap-3">
                                ${isCor ? '<span class="text-emerald-500">✓</span> Analysis Verified' : '<span class="text-rose-500">✕</span> Analysis Failed'}
                            </h3>
                            
                            <div class="flex flex-col md:flex-row gap-4 mb-6">
                                <div class="flex-1 bg-black/20 rounded-2xl p-4 border border-white/5">
                                    <span class="text-[10px] uppercase font-semibold tracking-widest text-slate-500 block mb-2">Agent Verdict</span>
                                    <span class="font-mono text-sm text-slate-200 uppercase">${e.end.verdict.replace(/_/g, ' ')}</span>
                                </div>
                                <div class="flex-1 bg-black/20 rounded-2xl p-4 border border-white/5">
                                    <span class="text-[10px] uppercase font-semibold tracking-widest text-slate-500 block mb-2">Ground Truth</span>
                                    <span class="font-mono text-sm text-slate-400 uppercase">${e.end.true_label.replace(/_/g, ' ')}</span>
                                </div>
                            </div>
                            
                            <div class="border-t border-white/5 pt-4 flex gap-8 font-mono text-[11px] text-slate-500">
                                <span>TOTAL STEPS <span class="text-slate-300 ml-1">${e.end.steps}</span></span>
                                <span>EXECUTION <span class="text-slate-300 ml-1">${e.end.time_s}s</span></span>
                            </div>
                        </div>
                    </div>
                `;
            }

            tl += `</div>`;
            document.getElementById('timelineContainer').innerHTML = tl;
        }
    </script>
</body>
</html>
