name: forge-ma
version: 2.0.0
description: "FORGE-MA: Multi-Agent Forensic RL Graph Environment for Misinformation Investigation (v2 - hierarchical multi-agent, co-evolutionary self-play)"
author: "FORGE Team"
tags: [openenv, multi-agent, self-play, misinformation]

tasks:
  - id: fabricated_stats
    difficulty: easy
  - id: out_of_context
    difficulty: medium
  - id: coordinated_campaign
    difficulty: hard
  - id: politifact_liar
    difficulty: medium
  - id: image_forensics
    difficulty: hard
  - id: sec_fraud
    difficulty: hard
  - id: verified_fact
    difficulty: easy
  - id: satire_news
    difficulty: medium
docker:
  build: .
  port: 7860
endpoints:
  reset:
    path: /reset
    method: POST
  step:
    path: /step
    method: POST
  state:
    path: /state
    method: GET
  tasks:
    path: /tasks
    method: GET
  observations_schema:
    path: /observations/schema
    method: GET
  actions_schema:
    path: /actions/schema
    method: GET
  rewards_schema:
    path: /rewards/schema
    method: GET
observation_space:
  type: Dict
  keys:
    claim_embed: {type: Box, shape: [384], dtype: float32}
    tool_history: {type: Box, shape: [13], dtype: float32}
    scalars: {type: Box, shape: [6], dtype: float32}
action_space:
  type: Discrete
  n: 13
reward_range: [0.001, 0.999]
